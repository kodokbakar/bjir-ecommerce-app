services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "8080"

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: go_ecommerce_api
      DB_SSLMODE: disable
      DB_POOL_MAX_CONNS: "10"
      DB_POOL_MIN_CONNS: "0"
      DB_POOL_MAX_CONN_LIFETIME: 1h
      DB_POOL_MAX_CONN_IDLE_TIME: 30m
      DB_POOL_HEALTH_CHECK_PERIOD: 1m

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_POOL_SIZE: "10"
      REDIS_MIN_IDLE_CONNS: "2"
      REDIS_DIAL_TIMEOUT: 5s
      REDIS_READ_TIMEOUT: 3s
      REDIS_WRITE_TIMEOUT: 3s

      JWT_SECRET: change_me_for_local_dev
      JWT_EXPIRES_IN: 24h
      JWT_ISSUER: go-ecommerce-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_network

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_ecommerce_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_ecommerce_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

volumes:
  postgres_data:
  redis_data:

networks:
  ecommerce_network:
    driver: bridge